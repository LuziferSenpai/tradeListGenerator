<!DOCTYPE html>
<html lang="en" data-theme="black">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Trade List Generator</title>
        <link href="./index.css" rel="stylesheet">
        <script src="./index.js"></script>
    </head>
    <body class="flex min-h-screen p-4 flex-col gap-4">
        <header class="flex">
            <div class="card grid w-full h-fit p-4 grid-cols-2 items-center gap-4 rounded-xl bg-base-300">
                <div class="flex flex-col gap-4">
                    <div class="flex items-center justify-between text-lg font-bold">
                        <h3 class="px-2">Import</h3>
                        <button id="btn-import" class="btn btn-primary rounded-2xl" onclick="importWishlist()">Import</button>
                    </div>
                    <textarea id="import-field" class="textarea textarea-neutral w-full resize-none rounded-2xl" placeholder="Paste JSON file content" spellcheck="false"></textarea>
                </div>
                <div class="flex flex-col gap-4">
                    <div class="flex items-center justify-between text-lg font-bold">
                        <button id="btn-export" class="btn btn-primary rounded-2xl" onclick="exportWishlist()">Export</button>
                        <h3 class="px-2">Export</h3>
                    </div>
                    <textarea id="export-field" class="textarea textarea-neutral w-full resize-none rounded-2xl" placeholder="Exported JSON will appear here…" readonly spellcheck="false"></textarea>
                </div>
            </div>
        </header>
        <main class="flex flex-col gap-4 flex-1">
            <div class="flex w-full gap-2 items-center">
                <div class="join w-1/3">
                    <input id="name-filter" type="text" class="input input-bordered input-neutral join-item w-full rounded-l-2xl" placeholder="Filter by name" oninput="setNameFilter(event)">
                    <div class="dropdown">
                        <div tabindex="0" role="button" class="btn join-item flex w-20 items-center rounded-r-2xl" id="rarity-display">
                            <span>All</span>
                        </div>
                        <ul tabindex="0" class="dropdown-content menu bg-base-300 rounded-box z-10 w-24 p-2 shadow">
                            <li><a class="text-sm" onclick="setRarity('all')">All</a></li>
                            <li><a onclick="setRarity('C Pocket')"><img src="./rarities/C Pocket.png" class="h-3 object-contain"></a></li>
                            <li><a onclick="setRarity('U Pocket')"><img src="./rarities/U Pocket.png" class="h-3 object-contain"></a></li>
                            <li><a onclick="setRarity('R Pocket')"><img src="./rarities/R Pocket.png" class="h-3 object-contain"></a></li>
                            <li><a onclick="setRarity('RR Pocket')"><img src="./rarities/RR Pocket.png" class="h-3 object-contain"></a></li>
                            <li><a onclick="setRarity('SA Pocket')"><img src="./rarities/SA Pocket.png" class="h-3 object-contain"></a></li>
                            <li><a onclick="setRarity('SSASR Pocket')"><img src="./rarities/SSASR Pocket.png" class="h-3 object-contain"></a></li>
                            <li><a onclick="setRarity('S Pocket')"><img src="./rarities/S Pocket.png" class="h-3 object-contain"></a></li>
                        </ul>
                    </div>
                </div>
                <div class="divider w-full">Sets</div>
                <button class="btn flex w-fit items-center rounded-2xl" onclick="clearWishlist()">Clear Wishlist</button>
            </div>
            <div id="sets-accordions" class="join join-vertical bg-base-100 rounded-2xl">
            </div>
        </main>
        <div id="toast" class="toast toast-top toast-center"></div>
    </body>
</html>
